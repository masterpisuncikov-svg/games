<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Roblox Live Games</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0ff;
            min-height: 100vh;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 35px 0 25px;
        }
        h1 {
            font-size: 2.8em;
            color: #c3b1e1;
            text-shadow: 0 0 15px rgba(195,177,225,0.4);
            margin-bottom: 8px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 35px;
        }
        .stat-card {
            background: rgba(50, 40, 90, 0.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(140, 120, 220, 0.25);
            border-radius: 14px;
            padding: 15px 25px;
            text-align: center;
            min-width: 140px;
            transition: all 0.25s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(100, 80, 200, 0.3);
        }
        .stat-card h2 {
            font-size: 1.8em;
            color: #d0c0ff;
            margin-bottom: 4px;
        }
        .stat-card p {
            color: #a099cc;
            font-size: 0.85em;
        }
        .games-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .game-card {
            background: #2a2a3e; /* Серый прямоугольник */
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(120, 100, 200, 0.3);
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(100, 80, 200, 0.25);
        }
        .game-image-wrapper {
            position: relative;
            width: 100%;
            height: 160px; /* Высота для широкого изображения */
        }
        .game-image-link {
            display: block;
            width: 100%;
            height: 100%;
        }
        .game-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .game-name-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: #ffffff;
            font-size: 1.1em;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }
        .game-info {
            padding: 15px;
            font-size: 0.9em;
            color: #ccc;
        }
        .game-id {
            color: #a599dd;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-align: center;
        }
        .game-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        .players {
            color: #aaffaa;
            font-weight: bold;
        }
        .visits {
            color: #ffcc99;
        }
        .time-ago {
            color: #9988cc;
            font-size: 0.85em;
            margin-top: 8px;
            text-align: center;
        }
        .empty, .loading {
            text-align: center;
            padding: 80px;
            color: #b0a0ff;
            font-size: 1.3em;
            grid-column: 1 / -1;
        }
        .controls {
            text-align: center;
            margin: 25px 0;
        }
        button {
            background: linear-gradient(90deg, #7b5cff, #a78bff);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            margin: 0 10px;
            cursor: pointer;
            transition: all 0.25s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 92, 255, 0.4);
        }
        .timestamp {
            text-align: center;
            color: #8877aa;
            margin-top: 30px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Roblox Live Games</h1>
        <p>Активные сервера в реальном времени</p>
    </header>

    <div class="stats">
        <div class="stat-card">
            <h2 id="totalGames">0</h2>
            <p>Total Games</p>
        </div>
        <div class="stat-card">
            <h2 id="totalPlayers">0</h2>
            <p>Total Players</p>
        </div>
        <div class="stat-card">
            <h2 id="totalVisits">0</h2>
            <p>Total Visits</p>
        </div>
    </div>

    <div class="controls">
        <button onclick="loadGames()">⟳ Обновить</button>
        <button onclick="showAddForm()">+ Добавить игру</button>
    </div>

    <div class="games-container" id="gamesList">
        <div class="loading">Загрузка данных...</div>
    </div>

    <div class="timestamp">
        Последнее обновление: <span id="lastUpdate">—</span><br>
        Сервер: <span id="serverUrl">—</span>
    </div>
</div>

<!-- Модалка добавления -->
<div id="addModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#1a133f; padding:30px; border-radius:16px; width:90%; max-width:480px; border:1px solid #6655aa;">
        <h2 style="color:#c3aaff; margin-bottom:20px;">Добавить игру вручную</h2>
        <label style="display:block; margin:8px 0 4px; color:#aaaaff;">Place ID:</label>
        <input type="number" id="addGameId" style="width:100%; padding:10px; background:#2a1f55; border:1px solid #6655aa; border-radius:6px; color:white;">
        
        <label style="display:block; margin:16px 0 4px; color:#aaaaff;">Название:</label>
        <input type="text" id="addGameName" style="width:100%; padding:10px; background:#2a1f55; border:1px solid #6655aa; border-radius:6px; color:white;">
        
        <div style="margin-top:24px; display:flex; gap:12px;">
            <button onclick="addGameManual()" style="flex:1; background:#7b5cff;">Добавить</button>
            <button onclick="hideAddForm()" style="flex:1; background:#554488;">Отмена</button>
        </div>
        <div id="addMessage" style="margin-top:16px; padding:10px; border-radius:6px; display:none;"></div>
    </div>
</div>

<script>
const API_URL = window.location.origin;
const ROBLOX_API_URL = 'https://games.roblox.com/v1/games'; // Для дополнительной информации о игре

let games = [];

async function loadGames() {
    const container = document.getElementById('gamesList');
    container.innerHTML = '<div class="loading">Загружаем игры...</div>';

    try {
        const [gamesRes, statsRes] = await Promise.all([
            fetch(API_URL + '/api/games'),
            fetch(API_URL + '/api/stats')
        ]);

        games = await gamesRes.json();
        const stats = await statsRes.json();

        document.getElementById('totalGames').textContent   = stats.totalGames   || 0;
        document.getElementById('totalPlayers').textContent = stats.totalPlayers || 0;
        document.getElementById('totalVisits').textContent  = stats.totalVisits  || 0;

        // Дополнительно загружаем данные с Roblox API для каждой игры (например, playing count, если нужно обновить)
        await enrichGamesWithRobloxData();

        displayGames(games);

        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ru-RU');
        document.getElementById('serverUrl').textContent = API_URL;
    } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="empty" style="color:#ff7777">Ошибка загрузки данных</div>';
    }
}

async function enrichGamesWithRobloxData() {
    if (!games.length) return;

    const placeIds = games.map(g => g.id).join(',');
    try {
        const response = await fetch(`${API_URL}/api/roblox/games?placeIds=${placeIds}`);
        const data = await response.json();
        
        data.data.forEach(robloxGame => {
            const localGame = games.find(g => g.id == robloxGame.placeId);
            if (localGame) {
                localGame.players = robloxGame.playing || localGame.players; // Обновляем текущих игроков с Roblox API
                localGame.visits = robloxGame.visits || localGame.visits; // Обновляем визиты
            }
        });
    } catch (err) {
        console.error('Ошибка загрузки данных с Roblox API:', err);
    }
}

function displayGames(gamesList) {
    const container = document.getElementById('gamesList');

    if (!gamesList?.length) {
        container.innerHTML = '<div class="empty">Пока нет игр в базе</div>';
        return;
    }

    // Сортируем по последней активности
    gamesList.sort((a,b) => new Date(b.lastSeen) - new Date(a.lastSeen));

    let html = '';

    gamesList.forEach((game, index) => {
        const thumbUrl = `https://thumbnails.roblox.com/v1/games/thumbnails?placeIds=${game.id}&size=768x432&format=Png&isCircular=false`;
        const gameUrl = game.url || `https://www.roblox.com/games/${game.id}/`;
        html += `
            <div class="game-card">
                <div class="game-image-wrapper">
                    <a href="${gameUrl}" target="_blank" class="game-image-link">
                        <img class="game-image" 
                             src="${thumbUrl}" 
                             alt="${game.name || 'Game'}" 
                             onerror="this.src='https://via.placeholder.com/768x432/2a2a3e/4a4a5e?text=No+Image';">
                    </a>
                    <div class="game-name-overlay">${game.name || 'Без названия'}</div>
                </div>
                <div class="game-info">
                    <div class="game-id">ID: ${game.id}</div>
                    <div class="game-meta">
                        <span class="players">👥 ${game.players || 0} playing</span>
                        <span class="visits">📊 ${(game.visits || 0).toLocaleString()} visits</span>
                    </div>
                    <div class="time-ago">Updated: ${formatTimeAgo(game.lastSeen)}</div>
                </div>
            </div>`;
    });

    container.innerHTML = html;
}

function formatTimeAgo(dateStr) {
    if (!dateStr) return '—';
    const date = new Date(dateStr);
    const diff = Date.now() - date.getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'только что';
    if (min < 60) return min + ' мин назад';
    const h = Math.floor(min / 60);
    if (h < 24) return h + ' ч назад';
    return date.toLocaleDateString('ru-RU');
}

// Модалка
function showAddForm() { document.getElementById('addModal').style.display = 'flex'; }
function hideAddForm() { 
    document.getElementById('addModal').style.display = 'none'; 
    document.getElementById('addMessage').style.display = 'none'; 
}

async function addGameManual() {
    const id = document.getElementById('addGameId').value.trim();
    const name = document.getElementById('addGameName').value.trim();
    const msg = document.getElementById('addMessage');

    if (!id || !name) {
        msg.textContent = 'Введите ID и название';
        msg.style.background = '#660000';
        msg.style.display = 'block';
        return;
    }

    try {
        const r = await fetch(API_URL + '/api/register', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ gameId: id, gameName: name, players: 0 })
        });
        const res = await r.json();

        if (res.success) {
            msg.textContent = 'Игра добавлена!';
            msg.style.background = '#336633';
            msg.style.display = 'block';
            setTimeout(() => { hideAddForm(); loadGames(); }, 1400);
        } else {
            msg.textContent = res.error || 'Ошибка';
            msg.style.background = '#660000';
            msg.style.display = 'block';
        }
    } catch (e) {
        msg.textContent = 'Ошибка сети';
        msg.style.background = '#660000';
        msg.style.display = 'block';
    }
}

loadGames();
setInterval(loadGames, 30000);
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadGames();
});
</script>
</body>
</html>
